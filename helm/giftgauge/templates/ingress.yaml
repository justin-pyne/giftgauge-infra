{{/* =========================================================================
Ingresses — public and shadow.

Public Ingress (host = .Values.ingress.host):
  Rendered when:
    - global.color is empty (non-prod environments — single Ingress per env)
    - OR global.color == global.activeColor (prod: only the active color
      serves the public host)

Shadow Ingress (host = .Values.ingress.shadowHost):
  Rendered when ingress.shadowHost is non-empty. Used in prod to give each
  color its own private testing URL (e.g., prod-green.justinpyne.xyz).

Path routing:
  /api/profile/(.*)   →  profile-service:3001 (strip prefix via $2)
  /api/sharing/(.*)   →  sharing-service:3002 (strip prefix via $2)
  /api/scoring/(.*)   →  scoring-service:3003 (strip prefix via $2)
  /(/?)(.*)           →  frontend (preserve full path via $2)

Both API and frontend paths must have two capture groups because the
nginx.ingress.kubernetes.io/rewrite-target annotation is per-Ingress and
expects $2. Without a capture group, the frontend's rule would rewrite
every request to just "/" — breaking Vite's module loading of /src/main.tsx,
/@vite/client, /@react-refresh, etc.
========================================================================= */}}

{{- $isPublicActive := or (not .Values.global.color) (eq .Values.global.color .Values.global.activeColor) }}

{{/* ---------- public Ingress ---------- */}}
{{- if and .Values.ingress.enabled $isPublicActive }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: giftgauge
  labels:
    {{- include "giftgauge.commonLabels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API paths first (strip the prefix via $2).
          {{- range $name, $svc := .Values.services }}
          {{- if $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}

          # Frontend catch-all (preserve the full path via $2).
          # Must come last so API paths win the match.
          {{- range $name, $svc := .Values.services }}
          {{- if not $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}(/?)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}
{{- end }}

{{/* ---------- shadow Ingress (per-color testing URL) ---------- */}}
{{- if and .Values.ingress.enabled .Values.ingress.shadowHost }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: giftgauge-shadow
  labels:
    {{- include "giftgauge.commonLabels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
    - hosts:
        - {{ .Values.ingress.shadowHost }}
      secretName: {{ .Values.ingress.shadowTlsSecretName }}

  rules:
    - host: {{ .Values.ingress.shadowHost }}
      http:
        paths:
          {{- range $name, $svc := .Values.services }}
          {{- if $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}

          {{- range $name, $svc := .Values.services }}
          {{- if not $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}(/?)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}
{{- end }}