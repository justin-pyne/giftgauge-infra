{{/* =========================================================================
Deployments — one per entry in .Values.services.

The loop produces a Deployment for each service (frontend, profile, sharing,
scoring). Each one:
  - Pulls its image from ECR using the global registry + per-service repo
    + global tag
  - Loads DB credentials from the Kubernetes Secret named in
    .Values.database.secretName via envFrom — so all DATABASE_URL,
    DB_HOST, etc. become env vars in the container
  - Adds liveness + readiness probes hitting the configured healthcheck path
  - Schedules onto the configured nodegroup (default: primary)
========================================================================= */}}

{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "giftgauge.serviceLabels" (dict "Values" $.Values "Release" $.Release "Chart" $.Chart "service" $name) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: giftgauge
      app.kubernetes.io/component: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "giftgauge.serviceLabels" (dict "Values" $.Values "Release" $.Release "Chart" $.Chart "service" $name) | nindent 8 }}
    spec:
      nodeSelector:
        nodegroup: {{ $svc.nodegroup | default "primary" }}

      containers:
        - name: {{ $name }}
          image: {{ include "giftgauge.serviceImage" (dict "Values" $.Values "service" $name) }}
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP

          # Per-service env vars from values.yaml.
          env:
            {{- with $svc.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            # Inject the in-cluster URLs of the other backends, so the scoring
            # service can call profile/sharing internally without going through
            # the public ingress.
            - name: PROFILE_SERVICE_URL
              value: "http://profile.{{ $.Release.Namespace }}.svc.cluster.local:3001"
            - name: SHARING_SERVICE_URL
              value: "http://sharing.{{ $.Release.Namespace }}.svc.cluster.local:3002"

          {{- if ne $name "frontend" }}
          # Backends pull DB credentials from the namespace-scoped secret
          # that Terraform created.
          envFrom:
            - secretRef:
                name: {{ $.Values.database.secretName }}
          {{- end }}

          resources:
            {{- toYaml $svc.resources | nindent 12 }}

          {{- with $svc.healthcheck }}
          livenessProbe:
            httpGet:
              path: {{ .liveness }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .readiness }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- end }}
{{- end }}
