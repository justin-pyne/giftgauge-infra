{{/* =========================================================================
Ingresses — public and shadow.

Public Ingress (host = .Values.ingress.host):
  Rendered when:
    - global.color is empty (non-prod environments — single Ingress per env)
    - OR global.color == global.activeColor (prod: only the active color
      serves the public host)

Shadow Ingress (host = .Values.ingress.shadowHost):
  Rendered when ingress.shadowHost is non-empty. Used in prod to give each
  color its own private testing URL (e.g., prod-green.justinpyne.xyz) so
  the workflow can smoke-test the inactive color before flipping.

Path-based routing is identical for both Ingresses:
  /api/profile/*  →  profile-service:3001
  /api/sharing/*  →  sharing-service:3002
  /api/scoring/*  →  scoring-service:3003
  /               →  frontend (catch-all)

The /api/<service> prefix is stripped via the rewrite-target annotation
so backends see paths starting at /.
========================================================================= */}}

{{- $isPublicActive := or (not .Values.global.color) (eq .Values.global.color .Values.global.activeColor) }}

{{/* ---------- public Ingress ---------- */}}
{{- if and .Values.ingress.enabled $isPublicActive }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: giftgauge
  labels:
    {{- include "giftgauge.commonLabels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API paths first (with rewrite).
          {{- range $name, $svc := .Values.services }}
          {{- if $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}

          # Frontend catch-all (no rewrite). Must come last.
          {{- range $name, $svc := .Values.services }}
          {{- if not $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}
{{- end }}

{{/* ---------- shadow Ingress (per-color testing URL) ---------- */}}
{{- if and .Values.ingress.enabled .Values.ingress.shadowHost }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: giftgauge-shadow
  labels:
    {{- include "giftgauge.commonLabels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
    - hosts:
        - {{ .Values.ingress.shadowHost }}
      secretName: {{ .Values.ingress.shadowTlsSecretName }}

  rules:
    - host: {{ .Values.ingress.shadowHost }}
      http:
        paths:
          {{- range $name, $svc := .Values.services }}
          {{- if $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}

          {{- range $name, $svc := .Values.services }}
          {{- if not $svc.pathRewrite }}
          - path: {{ $svc.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
          {{- end }}
{{- end }}
