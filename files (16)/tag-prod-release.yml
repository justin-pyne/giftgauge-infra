# =============================================================================
# Tag-driven prod release dispatch.
#
# Fires when a git tag matching v*.*.* is pushed to the app repo.
# Verifies the corresponding image tag exists in ECR (the master push that
# introduced this VERSION should have already built it), then dispatches a
# `prod-release-requested` event to the infra repo.
#
# Why no build step here: image immutability. The image was built once on
# master push and lived in ECR before the tag was created. Re-building on
# tag would risk shipping different bytes than what was tested in qa/uat.
# =============================================================================

name: tag-prod-release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify-and-dispatch:
    name: verify image exists and dispatch to infra
    runs-on: ubuntu-latest

    steps:
      - name: extract version from tag
        id: version
        run: |
          # github.ref_name on a tag push is the tag itself, e.g. "v0.1.5"
          VERSION='${{ github.ref_name }}'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION to prod"

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: verify all 4 images exist in ECR
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          MISSING=0
          for svc in frontend profile sharing scoring; do
            if ! aws ecr describe-images \
              --repository-name giftgauge-${svc} \
              --image-ids imageTag=${VERSION} \
              --region us-east-1 >/dev/null 2>&1; then
              echo "::error::giftgauge-${svc}:${VERSION} not found in ECR"
              MISSING=1
            else
              echo "OK: giftgauge-${svc}:${VERSION} exists"
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "::error::Missing images. Did you bump VERSION on master before tagging?"
            exit 1
          fi

      - name: dispatch prod release event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: justin-pyne/giftgauge-infra
          event-type: prod-release-requested
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}",
              "tag_sha": "${{ github.sha }}"
            }
