# =============================================================================
# prod-blue environment.
#
# One half of the prod blue/green pair. Active when global.activeColor=blue
# (set via -f envs/prod-active-color.yaml at upgrade time).
#
# Used as: helm upgrade --install giftgauge ./helm/giftgauge \
#          --namespace prod-blue \
#          -f envs/prod-blue/values.yaml \
#          -f envs/prod-active-color.yaml
# =============================================================================

global:
  environment: prod-blue
  color: blue
  imageTag: v0.1.0           # bumped by release-prod.yml when this color is the deploy target

ingress:
  host: app.justinpyne.xyz
  tlsSecretName: prod-app-tls
  shadowHost: prod-blue.justinpyne.xyz
  shadowTlsSecretName: prod-blue-shadow-tls

database:
  envDbName: giftgauge_prod  # SAME as prod-green; both colors share the DB

services:
  frontend:
    replicas: 2
  profile:
    replicas: 2
  sharing:
    replicas: 2
  scoring:
    replicas: 2
