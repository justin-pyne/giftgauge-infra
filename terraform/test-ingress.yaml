# =============================================================================
# Phase 5A end-to-end verification.
#
# Deploys a tiny echo-server pod, a Service in front of it, and an Ingress
# that requests an HTTPS certificate from Let's Encrypt for
# echo.justinpyne.xyz.
#
# Apply with: kubectl apply -f test-ingress.yaml
# Tear down with: kubectl delete -f test-ingress.yaml
#
# Expected end state: `curl https://echo.justinpyne.xyz` returns echo output
# with a valid certificate (no -k needed).
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: phase5-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: phase5-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          # ealen/echo-server is a small image that echoes request details
          # back as JSON. Useful for confirming traffic actually reaches the
          # pod (proxy headers, IP, etc.).
          image: ealen/echo-server:0.9.2
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: phase5-test
spec:
  selector:
    app: echo
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo
  namespace: phase5-test
  annotations:
    # Tells cert-manager to request a Let's Encrypt cert for the hosts
    # listed in `tls` below, using the ClusterIssuer we created.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - echo.justinpyne.xyz
      secretName: echo-tls
  rules:
    - host: echo.justinpyne.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo
                port:
                  number: 80
