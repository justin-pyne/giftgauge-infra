# =============================================================================
# Auto-deploy to dev on app release.
#
# Triggered by repository_dispatch (event_type=app-released) from the app repo's
# release.yml. Bumps envs/dev/values.yaml to the new version, commits, and runs
# helm upgrade against the dev namespace.
#
# On successful dev deploy, dispatches a `dev-deployed` event which triggers
# promote.yml to automatically promote dev → qa. That promotion in turn
# dispatches `qa-deployed`, triggering qa → uat promotion. The full chain:
#
#   master push → release.yml → app-released → deploy.yml → dev-deployed →
#     promote.yml (dev → qa) → qa-deployed → promote.yml (qa → uat)
#
# Prod is excluded from the auto chain. Prod releases are triggered by an
# explicit git tag push (see app repo's tag-prod-release.yml).
# =============================================================================

name: deploy

on:
  repository_dispatch:
    types: [app-released]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy-dev:
    name: deploy to dev
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: extract version from dispatch payload
        id: version
        run: |
          VERSION='${{ github.event.client_payload.version }}'
          if [ -z "$VERSION" ]; then
            echo "::error::No version in dispatch payload"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying $VERSION to dev"

      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: bump dev imageTag
        run: |
          NEW_TAG='${{ steps.version.outputs.version }}'
          sed -i -E "s|(^\s*imageTag:\s*).*|\1${NEW_TAG}|" envs/dev/values.yaml
          echo "----- diff -----"
          git diff envs/dev/values.yaml

      - name: commit values bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_TAG='${{ steps.version.outputs.version }}'

          if git diff --quiet envs/dev/values.yaml; then
            echo "No change — dev was already at ${NEW_TAG}"
          else
            git add envs/dev/values.yaml
            git commit -m "chore(deploy): dev → ${NEW_TAG}"
            git push
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name giftgauge-eks
          kubectl get nodes

      - name: install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm upgrade dev
        run: |
          helm upgrade --install giftgauge ./helm/giftgauge \
            --namespace dev \
            -f envs/dev/values.yaml \
            --wait \
            --timeout 10m

      - name: smoke-test dev
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
                 https://dev.justinpyne.xyz/api/profile/health; then
              echo "smoke test PASSED on dev (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt failed; waiting 30s for cert-manager..."
            sleep 30
          done
          echo "::error::smoke test failed on dev after 5 attempts"
          exit 1

      # ---------------------------------------------------------------------
      # Auto-chain trigger: dispatch dev-deployed event to start qa promotion.
      # This is the link that turns dev deployment into the start of the
      # automatic dev → qa → uat chain required by the rubric.
      # ---------------------------------------------------------------------
      - name: dispatch dev-deployed event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: dev-deployed
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}"
            }