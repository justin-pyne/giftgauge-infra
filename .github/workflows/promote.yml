# =============================================================================
# Environment promotion.
#
# Two trigger modes:
#
#   AUTOMATIC (via repository_dispatch from deploy.yml or this workflow):
#     event_type=dev-deployed → promote dev → qa
#     event_type=qa-deployed  → promote qa → uat
#     This forms the automatic dev → qa → uat chain required by the rubric.
#
#   MANUAL (via workflow_dispatch):
#     Operator triggers from the GitHub UI, choosing from_env and to_env.
#     Useful for re-running a promotion, or for promotions during recovery
#     when the auto-chain shouldn't fire.
#
# Production is excluded from this workflow. Prod releases are deliberately
# tag-driven via the app repo (see release-prod.yml).
# =============================================================================

name: promote

on:
  workflow_dispatch:
    inputs:
      from_env:
        description: 'Source environment'
        required: true
        type: choice
        options: [dev, qa]
      to_env:
        description: 'Target environment'
        required: true
        type: choice
        options: [qa, uat]
      reason:
        description: 'Why are you promoting? (audit trail)'
        required: true
        type: string

  repository_dispatch:
    types: [dev-deployed, qa-deployed]

concurrency:
  group: promote
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  promote:
    name: promote
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      to_env: ${{ steps.params.outputs.to_env }}

    steps:
      # ---------------------------------------------------------------------
      # Step 1: Resolve from_env/to_env/reason depending on trigger type.
      # ---------------------------------------------------------------------
      - name: resolve promotion params
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            EVENT_TYPE='${{ github.event.action }}'
            case "$EVENT_TYPE" in
              dev-deployed)
                FROM=dev
                TO=qa
                REASON="auto-promote on dev-deployed event"
                ;;
              qa-deployed)
                FROM=qa
                TO=uat
                REASON="auto-promote on qa-deployed event"
                ;;
              *)
                echo "::error::Unknown event type: $EVENT_TYPE"
                exit 1
                ;;
            esac
            echo "Trigger: repository_dispatch ($EVENT_TYPE)"
          else
            FROM='${{ inputs.from_env }}'
            TO='${{ inputs.to_env }}'
            REASON='${{ inputs.reason }}'
            echo "Trigger: workflow_dispatch (manual)"
          fi

          echo "from_env=$FROM" >> "$GITHUB_OUTPUT"
          echo "to_env=$TO"     >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "Promoting: $FROM → $TO"
          echo "Reason: $REASON"

      # ---------------------------------------------------------------------
      # Step 2: Validate the promotion path. Only dev→qa and qa→uat allowed.
      # ---------------------------------------------------------------------
      - name: validate promotion path
        run: |
          FROM='${{ steps.params.outputs.from_env }}'
          TO='${{ steps.params.outputs.to_env }}'

          case "${FROM}/${TO}" in
            dev/qa|qa/uat)
              echo "Path ${FROM} → ${TO} is valid"
              ;;
            *)
              echo "::error::Invalid promotion path ${FROM} → ${TO}. Allowed: dev→qa, qa→uat."
              exit 1
              ;;
          esac

      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ---------------------------------------------------------------------
      # Step 3: Read the imageTag from the source environment's values.yaml.
      # That's the version we're promoting forward.
      # ---------------------------------------------------------------------
      - name: read source version
        id: version
        run: |
          FROM='${{ steps.params.outputs.from_env }}'
          VERSION=$(awk '/^[[:space:]]*imageTag:/ {gsub(/[[:space:]]/,"",$2); print $2; exit}' \
            envs/${FROM}/values.yaml)

          if [ -z "$VERSION" ]; then
            echo "::error::Could not read imageTag from envs/${FROM}/values.yaml"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Source version: $VERSION"

      # ---------------------------------------------------------------------
      # Step 4: Write the source version to the target environment's values.
      # ---------------------------------------------------------------------
      - name: bump target imageTag
        run: |
          TO='${{ steps.params.outputs.to_env }}'
          NEW_TAG='${{ steps.version.outputs.version }}'
          sed -i -E "s|(^\s*imageTag:\s*).*|\1${NEW_TAG}|" envs/${TO}/values.yaml
          echo "----- diff -----"
          git diff envs/${TO}/values.yaml

      - name: commit promotion
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FROM='${{ steps.params.outputs.from_env }}'
          TO='${{ steps.params.outputs.to_env }}'
          NEW_TAG='${{ steps.version.outputs.version }}'
          REASON='${{ steps.params.outputs.reason }}'

          if git diff --quiet envs/${TO}/values.yaml; then
            echo "No change — ${TO} was already at ${NEW_TAG}"
          else
            git add envs/${TO}/values.yaml
            git commit -m "feat(promote): ${FROM} → ${TO} @ ${NEW_TAG}

          ${REASON}"
            git push
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name giftgauge-eks
          kubectl get nodes

      - name: install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm upgrade target environment
        run: |
          TO='${{ steps.params.outputs.to_env }}'
          helm upgrade --install giftgauge ./helm/giftgauge \
            --namespace ${TO} \
            -f envs/${TO}/values.yaml \
            --wait \
            --timeout 10m

      - name: smoke-test target
        run: |
          TO='${{ steps.params.outputs.to_env }}'
          HOST="${TO}.justinpyne.xyz"

          for attempt in 1 2 3 4 5; do
            if curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
                 https://${HOST}/api/profile/health; then
              echo "smoke test PASSED on $HOST (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt failed; waiting 30s..."
            sleep 30
          done
          echo "::error::smoke test failed on $HOST after 5 attempts"
          exit 1

      # ---------------------------------------------------------------------
      # Step 5: If we just promoted to qa, dispatch qa-deployed to chain the
      # next promotion (qa → uat). If we just promoted to uat, the auto-chain
      # ends here — production is intentionally a separate, tag-driven workflow.
      # ---------------------------------------------------------------------
      - name: dispatch qa-deployed event
        if: steps.params.outputs.to_env == 'qa'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: qa-deployed
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}"
            }