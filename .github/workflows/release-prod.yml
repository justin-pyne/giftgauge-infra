# =============================================================================
# Prod blue/green release.
#
# Triggered by:
#   - repository_dispatch (event_type=prod-release-requested) — fired by
#     app repo's tag-prod-release.yml when a v*.*.* tag is pushed
#   - workflow_dispatch (manual) — useful for re-running, rollbacks
#
# Two jobs:
#
#   1. deploy-inactive
#      Reads the current active color, computes the inactive color, deploys
#      the new version to inactive, smoke-tests via the shadow URL.
#
#   2. flip (gated by GitHub Environment approval — see Settings → Environments)
#      Updates envs/prod-active-color.yaml to point at what was the inactive,
#      helm upgrades both prod releases (new active first to add Ingress,
#      then old active to remove it), verifies app.justinpyne.xyz now serves
#      the new version.
#
# Rollback: re-run this workflow with the previous version; it will deploy
# that version to the inactive color (now the previously-active blue) and
# flip back. Or manually edit envs/prod-active-color.yaml and run any
# helm upgrade.
# =============================================================================

name: release-prod

on:
  repository_dispatch:
    types: [prod-release-requested]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to release (e.g., v0.1.5)'
        required: true
        type: string
      reason:
        description: 'Release notes / reason'
        required: true
        type: string

concurrency:
  group: release-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:

  # ===========================================================================
  # Job 1: deploy-inactive
  # ===========================================================================
  deploy-inactive:
    name: deploy to inactive color
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version:        ${{ steps.target.outputs.version }}
      active_color:   ${{ steps.colors.outputs.active }}
      inactive_color: ${{ steps.colors.outputs.inactive }}

    steps:
      - name: resolve target version and reason
        id: target
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION='${{ github.event.client_payload.version }}'
            REASON="prod release from tag (sha ${{ github.event.client_payload.tag_sha }})"
          else
            VERSION='${{ inputs.version }}'
            REASON='${{ inputs.reason }}'
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON"   >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION to prod"

      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: read active color from envs/prod-active-color.yaml
        id: colors
        run: |
          ACTIVE=$(awk '/^[[:space:]]*activeColor:/ {gsub(/[[:space:]]/,"",$2); print $2; exit}' \
            envs/prod-active-color.yaml)
          if [ "$ACTIVE" = "blue" ]; then
            INACTIVE=green
          elif [ "$ACTIVE" = "green" ]; then
            INACTIVE=blue
          else
            echo "::error::Unknown active color '$ACTIVE'. Expected blue or green."
            exit 1
          fi
          echo "Currently active: $ACTIVE"
          echo "Will deploy to:   $INACTIVE"
          echo "active=$ACTIVE"     >> "$GITHUB_OUTPUT"
          echo "inactive=$INACTIVE" >> "$GITHUB_OUTPUT"

      - name: bump prod-{inactive} imageTag
        run: |
          INACTIVE='${{ steps.colors.outputs.inactive }}'
          NEW_TAG='${{ steps.target.outputs.version }}'
          sed -i -E "s|(^\s*imageTag:\s*).*|\1${NEW_TAG}|" \
            envs/prod-${INACTIVE}/values.yaml
          echo "----- diff -----"
          git diff envs/prod-${INACTIVE}/values.yaml

      - name: commit values bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          INACTIVE='${{ steps.colors.outputs.inactive }}'
          NEW_TAG='${{ steps.target.outputs.version }}'

          if git diff --quiet envs/prod-${INACTIVE}/values.yaml; then
            echo "No change — prod-${INACTIVE} was already at ${NEW_TAG}"
          else
            git add envs/prod-${INACTIVE}/values.yaml
            git commit -m "feat(prod): deploy ${NEW_TAG} to prod-${INACTIVE} (inactive)

          ${{ steps.target.outputs.reason }}"
            git push
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name giftgauge-eks
          kubectl get nodes

      - name: install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm upgrade prod-{inactive}
        run: |
          INACTIVE='${{ steps.colors.outputs.inactive }}'
          # Layer prod-active-color.yaml LAST so it wins. This means inactive's
          # color won't match activeColor → public Ingress NOT rendered for
          # this color, only the shadow Ingress.
          helm upgrade --install giftgauge ./helm/giftgauge \
            --namespace prod-${INACTIVE} \
            -f envs/prod-${INACTIVE}/values.yaml \
            -f envs/prod-active-color.yaml \
            --wait \
            --timeout 10m

      - name: verify rollout on inactive
        run: |
          INACTIVE='${{ steps.colors.outputs.inactive }}'
          echo "----- pods -----"
          kubectl get pods -n prod-${INACTIVE}
          echo "----- ingress (should show ONLY giftgauge-shadow, not giftgauge) -----"
          kubectl get ingress -n prod-${INACTIVE}

      - name: smoke-test inactive via shadow URL
        run: |
          INACTIVE='${{ steps.colors.outputs.inactive }}'
          HOST="prod-${INACTIVE}.justinpyne.xyz"

          # Cert-manager may need 30-60s on first issuance for a new host.
          # Retry up to 5 times with a 30s sleep.
          for attempt in 1 2 3 4 5; do
            if curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
                 https://${HOST}/api/profile/health; then
              echo "smoke test PASSED on $HOST (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt failed; waiting 30s for cert-manager..."
            sleep 30
          done
          echo "::error::smoke test failed on $HOST after 5 attempts"
          exit 1

  # ===========================================================================
  # Job 2: flip
  # ===========================================================================
  flip:
    name: flip ingress to new color
    runs-on: ubuntu-latest
    needs: deploy-inactive

    # Manual approval gate. Configure in repo Settings → Environments → prod.
    environment:
      name: prod
      url: https://app.justinpyne.xyz

    permissions:
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0       # full history so the fast-forward works

      - name: fast-forward to latest main
        # Job 1 committed and pushed to main while this job was waiting on
        # the environment approval. Pull that commit before making ours.
        run: |
          git checkout main
          git pull --ff-only origin main

      - name: update activeColor in envs/prod-active-color.yaml
        run: |
          NEW_ACTIVE='${{ needs.deploy-inactive.outputs.inactive_color }}'
          sed -i -E "s|(^\s*activeColor:\s*).*|\1${NEW_ACTIVE}|" \
            envs/prod-active-color.yaml
          echo "----- diff -----"
          git diff envs/prod-active-color.yaml

      - name: commit activeColor flip
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_ACTIVE='${{ needs.deploy-inactive.outputs.inactive_color }}'
          OLD_ACTIVE='${{ needs.deploy-inactive.outputs.active_color }}'
          VERSION='${{ needs.deploy-inactive.outputs.version }}'

          git add envs/prod-active-color.yaml
          git commit -m "feat(prod): flip ${OLD_ACTIVE} → ${NEW_ACTIVE} @ ${VERSION}

          app.justinpyne.xyz now serves prod-${NEW_ACTIVE} (version ${VERSION}).
          prod-${OLD_ACTIVE} remains running as warm standby for fast rollback."
          git push

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name giftgauge-eks

      - name: install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm upgrade NEW active (adds public Ingress)
        # Order matters. Add Ingress to new active FIRST so traffic has somewhere
        # to land before we remove it from the old active.
        run: |
          NEW_ACTIVE='${{ needs.deploy-inactive.outputs.inactive_color }}'
          helm upgrade --install giftgauge ./helm/giftgauge \
            --namespace prod-${NEW_ACTIVE} \
            -f envs/prod-${NEW_ACTIVE}/values.yaml \
            -f envs/prod-active-color.yaml \
            --wait \
            --timeout 10m

      - name: helm upgrade OLD active (removes public Ingress)
        run: |
          OLD_ACTIVE='${{ needs.deploy-inactive.outputs.active_color }}'
          helm upgrade --install giftgauge ./helm/giftgauge \
            --namespace prod-${OLD_ACTIVE} \
            -f envs/prod-${OLD_ACTIVE}/values.yaml \
            -f envs/prod-active-color.yaml \
            --wait \
            --timeout 10m

      - name: verify cluster state
        run: |
          NEW_ACTIVE='${{ needs.deploy-inactive.outputs.inactive_color }}'
          OLD_ACTIVE='${{ needs.deploy-inactive.outputs.active_color }}'

          echo "===== prod-${NEW_ACTIVE} (now active) ====="
          kubectl get pods,ingress -n prod-${NEW_ACTIVE}

          echo "===== prod-${OLD_ACTIVE} (now warm standby) ====="
          kubectl get pods,ingress -n prod-${OLD_ACTIVE}

      - name: smoke-test public URL
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
                 https://app.justinpyne.xyz/api/profile/health; then
              echo "smoke test PASSED on app.justinpyne.xyz (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt failed; waiting 15s..."
            sleep 15
          done
          echo "::error::smoke test failed on app.justinpyne.xyz after 5 attempts"
          exit 1
